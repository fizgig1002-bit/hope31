<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 나의 인생 그래프 & 연표 🌟</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #fff9db; padding: 20px; color: #333; }
        #capture-area { background-color: white; padding: 30px; border-radius: 20px; border: 5px solid #ffec99; max-width: 900px; margin: 0 auto; }
        h1 { color: #f08c00; margin-bottom: 10px; }
        .name-input { font-size: 1.2rem; margin-bottom: 20px; padding: 10px; border: 2px solid #ffd43b; border-radius: 10px; width: 250px; text-align: center; }
        .input-box { background: #fff4e6; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
        input { padding: 10px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 1rem; }
        .age { width: 60px; background-color: #e9ecef; }
        .score { width: 140px; }
        .label { width: 250px; }
        button { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn-add { background-color: #fab005; color: white; }
        .btn-draw { background-color: #40c057; color: white; margin-left: 10px; }
        .btn-save { background-color: #228be6; color: white; margin-top: 20px; width: 100%; font-size: 1.2rem; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        .content-layout { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        #chart-container { flex: 2; min-width: 300px; height: 400px; }
        #timeline-container { flex: 1; min-width: 250px; background: #f1f3f5; padding: 20px; border-radius: 15px; text-align: left; }
        .timeline-item { margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dashed #ced4da; font-size: 0.95rem; }
    </style>
</head>
<body>

<div id="capture-area">
    <h1>🌈 나의 인생 그래프 그리기</h1>
    <input type="text" class="name-input" id="userName" placeholder="이름을 입력해요 (예: 홍길동)">

    <div class="input-box">
        <p>✨ 1살부터 지금 나이까지, 행복했던 순간을 기록해봐요!</p>
        <div id="inputs">
            <div class="input-group">
                <input type="number" class="age" value="1" readonly>
                <input type="number" class="score" placeholder="행복 점수(-10~10)" min="-10" max="10">
                <input type="text" class="label" placeholder="어떤 일이었나요? (예: 내가 태어남)">
            </div>
        </div>
        <button class="btn-add" onclick="addInput()">➕ 나이 추가하기</button>
        <button class="btn-draw" onclick="drawChart()">🎨 그래프와 연표 만들기</button>
    </div>

    <div class="content-layout">
        <div id="chart-container">
            <h3>📈 인생 그래프</h3>
            <canvas id="lifeChart"></canvas>
        </div>
        <div id="timeline-container">
            <h3>📜 인생 연표</h3>
            <div id="timeline-list">무엇을 입력했는지 여기에 나타나요!</div>
        </div>
    </div>

    <button class="btn-save" onclick="saveImage()">📸 사진으로 저장하여 제출하기</button>
</div>

<script>
    let myChart;
    let ageCount = 1;

    function addInput() {
        ageCount++;
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `
            <input type="number" class="age" value="${ageCount}" readonly>
            <input type="number" class="score" placeholder="행복 점수(-10~10)" min="-10" max="10">
            <input type="text" class="label" placeholder="그때 있었던 일">
        `;
        document.getElementById('inputs').appendChild(div);
    }

    function drawChart() {
        const name = document.getElementById('userName').value || "나";
        const ages = Array.from(document.querySelectorAll('.age')).map(input => input.value);
        const scores = Array.from(document.querySelectorAll('.score')).map(input => input.value);
        const labels = Array.from(document.querySelectorAll('.label')).map(input => input.value);

        // 그래프 업데이트
        if (myChart) myChart.destroy();
        const ctx = document.getElementById('lifeChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ages.map(a => a + '살'),
                datasets: [{
                    label: name + '의 행복 점수',
                    data: scores,
                    borderColor: '#f08c00',
                    backgroundColor: 'rgba(255, 146, 43, 0.2)',
                    tension: 0.3,
                    fill: true,
                    pointRadius: 8,
                    pointHoverRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { min: -10, max: 10, grid: { color: '#eee' } }
                }
            }
        });

        // 연표 업데이트
        const timelineList = document.getElementById('timeline-list');
        timelineList.innerHTML = '';
        ages.forEach((age, i) => {
            if(labels[i]) {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.innerHTML = `<strong>${age}살:</strong> ${labels[i]} (😊${scores[i]}점)`;
                timelineList.appendChild(item);
            }
        });
    }

    function saveImage() {
        const area = document.getElementById('capture-area');
        const name = document.getElementById('userName').value || "인생그래프";
        
        html2canvas(area).then(canvas => {
            const link = document.createElement('a');
            link.download = `${name}_나의인생그래프.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
