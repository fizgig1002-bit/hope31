<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>표정이 변하는 인생 그래프</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #fff9db; padding: 20px; text-align: center; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h2 { color: #f08c00; }
        .input-group { margin-bottom: 10px; display: flex; gap: 8px; justify-content: center; align-items: center; }
        input { padding: 10px; border: 2px solid #ffe066; border-radius: 8px; outline: none; }
        input:focus { border-color: #fab005; }
        .age { width: 60px; }
        .score { width: 120px; }
        .label { width: 200px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background-color: #ffec99; color: #856404; }
        .btn-draw { background-color: #fab005; color: white; margin-left: 10px; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        #chart-container { margin-top: 30px; position: relative; height: 450px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌈 나의 마음 날씨 인생 그래프</h2>
    <p>나이와 그때의 기분 점수(-10 ~ 10)를 적어보세요!</p>
    
    <div id="inputs">
        <div class="input-group">
            <input type="number" class="age" placeholder="나이" min="0" max="15">
            <input type="number" class="score" placeholder="기분(-10~10)" min="-10" max="10">
            <input type="text" class="label" placeholder="어떤 일이었나요?">
        </div>
    </div>

    <div style="margin-top: 20px;">
        <button class="btn-add" onclick="addInput()">칸 늘리기 +</button>
        <button class="btn-draw" onclick="drawChart()">그래프 그리기 🎨</button>
    </div>

    <div id="chart-container">
        <canvas id="lifeChart"></canvas>
    </div>
</div>

<script>
    let myChart;

    function getEmoji(score) {
        const s = Number(score);
        if (s >= 8) return '🤩';
        if (s >= 5) return '😊';
        if (s >= 2) return '🙂';
        if (s > -2) return '😐';
        if (s > -5) return '🙁';
        if (s > -8) return '😢';
        return '😭';
    }

    function addInput() {
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `
            <input type="number" class="age" placeholder="나이" min="0" max="15">
            <input type="number" class="score" placeholder="기분" min="-10" max="10">
            <input type="text" class="label" placeholder="어떤 일이었나요?">
        `;
        document.getElementById('inputs').appendChild(div);
    }

    function drawChart() {
        const ageElements = document.querySelectorAll('.age');
        const scoreElements = document.querySelectorAll('.score');
        const labelElements = document.querySelectorAll('.label');

        const dataPoints = [];
        for (let i = 0; i < ageElements.length; i++) {
            if (ageElements[i].value !== "" && scoreElements[i].value !== "") {
                dataPoints.push({
                    age: ageElements[i].value,
                    score: scoreElements[i].value,
                    text: labelElements[i].value,
                    emoji: getEmoji(scoreElements[i].value)
                });
            }
        }

        if (myChart) myChart.destroy();

        const ctx = document.getElementById('lifeChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dataPoints.map(d => d.age + '살'),
                datasets: [{
                    label: '행복 지수',
                    data: dataPoints.map(d => d.score),
                    borderColor: '#fab005',
                    backgroundColor: 'rgba(250, 176, 5, 0.1)',
                    borderWidth: 3,
                    tension: 0.3,
                    fill: true,
                    pointRadius: 8,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#fab005',
                    pointHoverRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        min: -10, 
                        max: 10,
                        ticks: { stepSize: 2 }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const d = dataPoints[context.dataIndex];
                                return ` [${d.emoji}] ${d.text}: ${d.score}점`;
                            }
                        }
                    },
                    // 그래프 위에 이모티콘 직접 그리기
                    legend: { display: false }
                }
            },
            plugins: [{
                afterDraw: (chart) => {
                    const ctx = chart.ctx;
                    chart.data.datasets.forEach((dataset, i) => {
                        const meta = chart.getDatasetMeta(i);
                        meta.data.forEach((element, index) => {
                            const { x, y } = element.tooltipPosition();
                            const emoji = dataPoints[index].emoji;
                            ctx.font = '24px Arial';
                            ctx.textAlign = 'center';
                            ctx.fillText(emoji, x, y - 15); // 점 위에 이모티콘 표시
                        });
                    });
                }
            }]
        });
    }
</script>
</body>
</html>
