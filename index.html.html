<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 인생 그래프 그리기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #f8f9fa; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 10px; display: flex; gap: 5px; justify-content: center; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; background-color: #4dabf7; color: white; }
        button:hover { background-color: #339af0; }
        #chart-container { margin-top: 30px; position: relative; height:400px; width:100% }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 나의 인생 그래프</h2>
    <p>나의 나이와 그때의 행복 점수(-10 ~ 10)를 입력해 보세요!</p>
    
    <div id="inputs">
        <div class="input-group">
            <input type="number" class="age" placeholder="나이 (예: 1)" min="0" max="10">
            <input type="number" class="score" placeholder="행복 점수 (-10~10)" min="-10" max="10">
            <input type="text" class="label" placeholder="어떤 일이었나요?">
        </div>
    </div>

    <div style="margin-top: 15px;">
        <button onclick="addInput()">행 추가하기 +</button>
        <button onclick="drawChart()" style="background-color: #51cf66;">그래프 그리기 🎨</button>
    </div>

    <div id="chart-container">
        <canvas id="lifeChart"></canvas>
    </div>
</div>

<script>
    let myChart;

    function addInput() {
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `
            <input type="number" class="age" placeholder="나이" min="0" max="10">
            <input type="number" class="score" placeholder="행복 점수" min="-10" max="10">
            <input type="text" class="label" placeholder="어떤 일이었나요?">
        `;
        document.getElementById('inputs').appendChild(div);
    }

    function drawChart() {
        const ages = Array.from(document.querySelectorAll('.age')).map(input => input.value);
        const scores = Array.from(document.querySelectorAll('.score')).map(input => input.value);
        const labels = Array.from(document.querySelectorAll('.label')).map(input => input.value);

        if (myChart) myChart.destroy();

        const ctx = document.getElementById('lifeChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ages.map((age, i) => age + '살 (' + labels[i] + ')'),
                datasets: [{
                    label: '행복 지수',
                    data: scores,
                    borderColor: '#ff922b',
                    backgroundColor: 'rgba(255, 146, 43, 0.2)',
                    tension: 0.3,
                    fill: true,
                    pointRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { min: -10, max: 10, grid: { color: '#eee' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }
</script>
</body>
</html>
